name: Helm Diff 🤖

on:
  workflow_dispatch:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

jobs:
  helm-diff:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Generate Results from Main
      run: |
        for p in $(ls -l charts | awk '{print $9}'); do helm template charts/$p -f charts/$p/values-ci.yaml > charts/$p/$p-main.yaml ; done

    - name: Upload devxp-app
      uses: actions/upload-artifact@v3
      with:
        name: devxp-app-main.yaml
        path: charts/devxp-app/devxp-app-main.yaml

    - name: Checkout 🛎️
      uses: actions/checkout@v4

    - name: Download devxp-app-main.yaml
      uses: actions/download-artifact@v3
      with:
        name: devxp-app-main.yaml

    - name: Print the final result
      shell: bash
      run: |
        value=`cat devxp-app-main.yaml`
        echo The result is $value

    - name: Upload devxp-app
      uses: actions/upload-artifact@v3
      with:
        name: devxp-app-main.yaml
        path: charts/devxp-app/devxp-app-main.yaml

    - name: Checkout 🛎️
      uses: actions/checkout@v4

    - name: Download devxp-app-main.yaml
      uses: actions/download-artifact@v3
      with:
        name: devxp-app-main.yaml

    # - name: Print the final result
    #   shell: bash
    #   run: |
    #     value=`cat devxp-app-main.yaml`
    #     echo The result is $value

    - name: Generate Results from PR
      run: |
        for p in $(ls -l charts | awk '{print $9}'); do helm template charts/$p -f charts/$p/values-ci.yaml > charts/$p/$p-pr.yaml ; done

    - name: Diff
      continue-on-error: true
      run: diff --side-by-side --suppress-common-lines --ignore-space-change devxp-app-main.yaml charts/devxp-app/devxp-app-pr.yaml  > diff.yaml && echo "Contents are identical"

    # - name: PR comment with file
    #   uses: thollander/actions-comment-pull-request@v2
    #   with:
    #     comment_tag: show_diff
    #     filePath: diff.yaml
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}